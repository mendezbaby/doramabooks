  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(900px 600px at 80% -10%, rgba(168, 85, 247, .25), transparent 60%),
        radial-gradient(700px 500px at 0% 100%, rgba(255, 77, 141, .2), transparent 55%),
        #0a0618;
      color: #f4f1ff;
      overflow: hidden;
      padding: 20px;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: .45; pointer-events: none; }
    .orb1 { width: 45vw; height: 45vw; left: -12vw; top: -10vw; background: radial-gradient(circle, #ff4d8d, transparent 65%); animation: d 20s ease-in-out infinite alternate; }
    .orb2 { width: 38vw; height: 38vw; right: -10vw; bottom: -10vw; background: radial-gradient(circle, #a855f7, transparent 65%); animation: d 24s ease-in-out infinite alternate-reverse; }
    @keyframes d { to { transform: translate(8vw, 8vh) scale(1.15); } }

    .card {
      position: relative;
      text-align: center;
      max-width: 420px;
      padding: 44px 36px;
      border-radius: 26px;
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .14);
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .55), 0 0 80px rgba(168, 85, 247, .2);
      animation: up .7s ease both;
    }
    @keyframes up { from { opacity: 0; transform: translateY(30px); } }

    .logo {
      font-weight: 800; letter-spacing: .5px; font-size: .95rem;
      background: linear-gradient(100deg, #ff4d8d, #a855f7, #22d3ee);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 22px;
    }
    .cover {
      width: 190px; margin: 0 auto 22px; border-radius: 12px;
      box-shadow: 0 18px 50px rgba(0,0,0,.6), 0 0 40px rgba(255,77,141,.3);
      animation: float 5s ease-in-out infinite;
    }
    @keyframes float { 50% { translate: 0 -10px; } }

    h1 { font-size: 1.35rem; line-height: 1.3; margin-bottom: 6px; }
    .sub { color: #b6aede; font-size: .9rem; margin-bottom: 26px; font-style: italic; }

    .btn {
      display: inline-block;
      padding: 16px 34px;
      border-radius: 999px;
      font-weight: 700; font-size: 1.05rem;
      color: #fff; text-decoration: none;
      background: linear-gradient(100deg, #ff4d8d, #a855f7, #22d3ee);
      background-size: 200% 100%;
      animation: grad 4s linear infinite;
      box-shadow: 0 0 26px rgba(255, 77, 141, .45), 0 0 60px rgba(168, 85, 247, .25);
      transition: transform .2s;
    }
    .btn:hover { transform: translateY(-2px) scale(1.02); }
    @keyframes grad { to { background-position: 200% 0; } }

    .count { margin-top: 20px; font-size: .82rem; color: #b6aede; }
    .count strong { color: #fbbf24; }
    .heart { color: #ff4d8d; }

      📖 Ler Agora
    </a>

    <p class="count">Abrindo o leitor em <strong id="n">5</strong> segundos…<br />
    Feito com <span class="heart">💜</span> pela DORAMAS BOOK</p>
  </div>

  <script>
    var n = 5, el = document.getElementById("n");
    var t = setInterval(function () {
      n--;
      if (n <= 0) { clearInterval(t); el.textContent = "0"; return; }
      el.textContent = n;
    }, 1000);
  </script>
</body>
</html>
